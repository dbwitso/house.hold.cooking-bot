# fly.toml app configuration file generated for household-cooking-bot on 2026-06-17T10:58:55+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'household-cooking-bot'
primary_region = 'jnb'

[env]
  PORT = '3000'
  TZ = 'Africa/Lusaka'

[[services]]
  protocol = ''
  internal_port = 3000
  processes = ['app']

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [[services.tcp_checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '1s'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
